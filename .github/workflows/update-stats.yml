name: Update GitHub Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tokei
        run: |
          sudo apt-get update
          sudo apt-get install -y tokei

      - name: Run stats updater
        run: python scripts/update_stats.py

      - name: Commit updated SVGs
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add dark_mode.svg light_mode.svg

          git commit -m "Update GitHub stats" || exit 0

          git push